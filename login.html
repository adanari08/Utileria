<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>Iniciar Sesión</h1>

    <p class="subtitulo">
        Ingresa tus credenciales para acceder a tu cuenta.
    </p>

    <form id="loginForm">

        <label for="correo">
            Correo electrónico
        </label>

        <input
            type="email"
            id="correo"
            placeholder="ejemplo@correo.com"
            required
        >

        <label for="password">
            Contraseña
        </label>

        <input
            type="password"
            id="password"
            placeholder="Ingresa tu contraseña"
            required
        >

        <button type="submit">
            Ingresar
        </button>

        <div id="mensajeError" class="error"></div>

        <div id="mensajeExito" class="success"></div>

        <p class="subtitulo" style="margin-top:20px;margin-bottom:0;">

            ¿No tienes cuenta?

            <a href="index.html">

                Regístrate aquí

            </a>

        </p>

    </form>

</div>

<script src="js/utileria.js"></script>

<script>

const form = document.getElementById("loginForm");
const mensajeError = document.getElementById("mensajeError");
const mensajeExito = document.getElementById("mensajeExito");

form.addEventListener("submit",function(event){

    event.preventDefault();

    mensajeError.textContent="";
    mensajeExito.textContent="";

    const correoVal=document.getElementById("correo").value.trim();
    const passwordVal=document.getElementById("password").value;

    if(!validarCorreo(correoVal)){
        mensajeError.textContent="El formato del correo electrónico no es válido.";
        return;
    }

    if(!validarPassword(passwordVal)){
        mensajeError.textContent="Contraseña incorrecta o formato inválido.";
        return;
    }

    mensajeExito.textContent="¡Acceso concedido! Iniciando sesión...";

});

</script>

</body>
</html>
