<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>Registro de Usuario</h1>

    <p class="subtitulo">
        Completa la siguiente información para crear tu cuenta.
    </p>

    <form id="registroForm">

        <label for="nombre">
            Nombre completo
        </label>

        <input
            type="text"
            id="nombre"
            placeholder="Ej. Juan Pérez"
            required
        >

        <label for="correo">
            Correo electrónico
        </label>

        <input
            type="email"
            id="correo"
            placeholder="ejemplo@correo.com"
            required
        >

        <label for="telefono">
            Teléfono
        </label>

        <input
            type="tel"
            id="telefono"
            placeholder="5512345678"
            required
        >

        <div class="fila">

            <div class="campo">

                <label for="fechaNacimiento">
                    Fecha de nacimiento
                </label>

                <input
                    type="date"
                    id="fechaNacimiento"
                    required
                >

            </div>

            <div class="campo">

                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña"
                    required
                >

            </div>

        </div>

        <button type="submit">
            Registrarse
        </button>

        <div id="mensajeError" class="error"></div>

        <p class="subtitulo" style="margin-top:20px; margin-bottom:0;">

            ¿Ya tienes cuenta?

            <a href="login.html">

                Inicia sesión aquí

            </a>

        </p>

    </form>

</div>

<!-- MODAL -->

<div id="miModal" class="modal">

    <div class="modal-content">

        <span
            class="close"
            id="cerrarModal"
        >
            &times;
        </span>

        <h2>
            ¡Registro exitoso!
        </h2>

        <p id="modalEdad"></p>

        <div class="success">

            Todos tus datos fueron validados correctamente.

        </div>

        <button id="btnAceptar">

            Aceptar

        </button>

    </div>

</div>

<script src="js/utileria.js"></script>

<script>

const form = document.getElementById('registroForm');
const mensajeError = document.getElementById('mensajeError');
const modal = document.getElementById('miModal');
const cerrarModal = document.getElementById('cerrarModal');
const modalEdad = document.getElementById('modalEdad');
const btnAceptar = document.getElementById('btnAceptar');

form.addEventListener('submit', function(event){

    event.preventDefault();

    mensajeError.textContent = "";

    let nombreVal = document.getElementById('nombre').value.trim();
    const correoVal = document.getElementById('correo').value.trim();
    const telefonoVal = document.getElementById('telefono').value.trim();
    const fechaVal = document.getElementById('fechaNacimiento').value;
    const passwordVal = document.getElementById('password').value;

    // Validar nombre
    if(!soloLetras(nombreVal)){
        mensajeError.textContent="El nombre solo debe contener letras.";
        return;
    }

    // Validar correo
    if(!validarCorreo(correoVal)){
        mensajeError.textContent="Por favor, ingresa un correo electrónico válido.";
        return;
    }

    // Validar teléfono
    if(
    !validarLongitud(telefonoVal,10) ||
    !validarTelefono(telefonoVal)
){
    mensajeError.textContent="El teléfono debe tener exactamente 10 dígitos.";
    return;
}

    // Validar mayoría de edad
    if(!esMayorDeEdad(fechaVal)){
        mensajeError.textContent="Debes ser mayor de edad (18 años o más) para registrarte.";
        return;
    }

    // Validar contraseña
    if(!validarPassword(passwordVal)){
        mensajeError.textContent="La contraseña no cumple con los requisitos mínimos de seguridad.";
        return;
    }

    // Capitalizar nombre
    nombreVal = capitalizarTexto(nombreVal);

    // Calcular edad
    const edad = calcularEdad(fechaVal);

    // Mostrar datos en el modal
    modalEdad.innerHTML = `
        <strong>Bienvenido, ${nombreVal}</strong>
        <br><br>
        Tu edad calculada es:
        <strong>${edad} años</strong>.
    `;

    modal.style.display = "block";

    form.reset();

});

// Cerrar modal con la X
cerrarModal.addEventListener("click",function(){
    modal.style.display="none";
});

// Cerrar modal con el botón
btnAceptar.addEventListener("click",function(){
    modal.style.display="none";
});

// Cerrar dando clic fuera
window.addEventListener("click",function(e){
    if(e.target===modal){
        modal.style.display="none";
    }
});

</script>

</body>
</html>
